trigger:
  branches:
    include:
      - main  # Jalankan pipeline ketika ada perubahan di branch main
  
  paths:
    include:
    - poc

pool: agentpool  # Menggunakan agen Ubuntu yang dikelola oleh Microsoft

variables:
  dockerRegistryServiceConnection: 'devops-poc'  # Ganti dengan service connection ke Docker Hub
  imageRepository: 'nuek21/testing-node'  # Ganti dengan nama repository Docker Hub kamu
  tag: '$(Build.BuildId)'  # Menggunakan BuildId sebagai tag versi image

steps:
  # Langkah 1: Checkout repository
  - checkout: self

  # Langkah 2: Install Node.js dependencies
  - task: NodeTool@0
    inputs:
      versionSpec: '14.x'
    displayName: 'Install Node.js'

  - script: |
      npm install
    displayName: 'Install dependencies'

  # Langkah 3: Build Docker image dan push ke Docker Hub
  - task: Docker@2
    inputs:
      containerRegistry: '$(dockerRegistryServiceConnection)'
      repository: '$(imageRepository)'
      command: 'buildAndPush'
      Dockerfile: 'poc/Dockerfile'
      tags: |
        latest
        $(tag)

  # Langkah 4: Publish build artifacts (opsional)
  - publish: $(Build.ArtifactStagingDirectory)
    artifact: drop
