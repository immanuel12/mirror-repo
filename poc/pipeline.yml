trigger:
  branches:
    include:
      - main  # Jalankan pipeline ketika ada perubahan di branch main
  
  paths:
    include:
      - poc  # Hanya jalankan pipeline jika ada perubahan di folder poc

pool: agentpool  # Menggunakan agen Ubuntu yang dikelola oleh Microsoft

variables:
  dockerRegistryServiceConnection: 'devops-poc'  # Ganti dengan service connection ke Docker Hub
  imageRepository: 'nuek21/testing-node'  # Ganti dengan nama repository Docker Hub kamu
  tag: '$(Build.BuildId)'  # Menggunakan BuildId sebagai tag versi image
  containerName: 'node-app-container'  # Nama container untuk menjalankan aplikasi
  proceedToMaster: 'yes'  # Ubah default untuk melanjutkan ke main jika build sukses

stages:
  - stage: BuildAndTest
    displayName: "Build and Test"
    jobs:
      - job: Build
        displayName: 'Build and Test Application'
        steps:
          # Langkah 1: Checkout repository
          - checkout: self

          # Langkah 2: Install Node.js dependencies
          - task: NodeTool@0
            inputs:
              versionSpec: '14.x'
            displayName: 'Install Node.js'

          # Langkah 3: Install dependencies dan build aplikasi
          - script: |
              cd poc  # Pindah ke direktori poc
              npm install  # Instal dependensi
              npm run build  # Jalankan build
            displayName: 'Install dependencies and Build application'

          # Langkah 4: Build Docker image dan push ke Docker Hub
          - task: Docker@2
            inputs:
              containerRegistry: '$(dockerRegistryServiceConnection)'
              repository: '$(imageRepository)'
              command: 'buildAndPush'
              Dockerfile: 'poc/Dockerfile'  # Pastikan path ini sesuai
              tags: |
                latest
                $(tag)

          # Langkah 5: Jalankan container dengan port 3000
          - script: |
              docker run -d -p 3000:3000 --name $(containerName) $(imageRepository):$(tag)
            displayName: 'Run Docker Container on Port 3000'

          # Langkah 6: Menyimpan hasil build ke dalam artefak
          - script: |
              cd poc  # Pindah ke direktori poc untuk mengakses hasil build
              if [ -d "dist" ]; then  # Periksa apakah folder dist ada
                  cp -r dist/* $(Build.ArtifactStagingDirectory)  # Salin hasil build ke direktori artefak
              else
                  echo "No build output found in 'dist' directory"; exit 1;  # Tangani jika tidak ada output
              fi
            displayName: 'Copy build output to artifacts'

          # Langkah 7: Publish artifacts
          - task: PublishBuildArtifacts@1
            inputs:
              pathtoPublish: '$(Build.ArtifactStagingDirectory)'  # Publikasi folder artefak
              artifactName: 'drop'  # Nama artefak yang akan muncul di dashboard
              publishLocation: 'Container'
            displayName: 'Publish artifacts'

  - stage: CreatePullRequest
    displayName: "Create Pull Request"
    dependsOn: BuildAndTest
    condition: succeeded()  # Hanya jalankan jika stage BuildAndTest sukses
    jobs:
      - job: PR
        displayName: 'Create Pull Request from dev to main'
        steps:
          # Langkah 8: Membuat pull request dari dev ke main
          - task: AzureReposPullRequest@1
            inputs:
              repositoryName: '$(Build.Repository.Name)'  # Nama repository
              sourceBranch: 'dev'  # Branch asal (dev)
              targetBranch: 'main'  # Branch tujuan (main)
              title: 'Auto PR: Merging changes from dev to main'
              description: 'Pull request otomatis untuk menggabungkan perubahan dari dev ke main'
              reviewers: ''  # Opsional: Menambahkan reviewer jika diinginkan
            displayName: 'Create Pull Request from dev to main'
