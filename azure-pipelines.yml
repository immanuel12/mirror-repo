trigger: 
  branches:
    include:
      - main  # Jalankan pipeline ketika ada perubahan di branch main
  
  paths:
    include:
      - project

pool: agentpool  # Menggunakan agen Ubuntu terbaru untuk menjalankan pipeline

variables:
  dockerRegistryServiceConnection: 'devops-poc'  # Service connection ke Docker Hub
  imageRepository: 'nuek21/app'  # Nama repository di Docker Hub
  containerRegistry: 'docker.io'
  tag: '$(Build.BuildId)'  # Menggunakan BuildId sebagai tag versi image

steps:
  # Langkah 1: Checkout kode sumber
  - checkout: self

  # Langkah 2: Install Node.js
  - task: NodeTool@0
    inputs:
      versionSpec: '14.x'  # Versi Node.js yang akan digunakan
    displayName: 'Install Node.js'

  # Langkah 3: Install dependencies dan jalankan tes pada aplikasi Node.js
  - script: |
      npm install
      npm test
    displayName: 'Install dependencies and run tests'

  # Langkah 4: Build dan Push Docker image ke Docker Hub
  - task: Docker@2
    inputs:
      containerRegistry: '$(dockerRegistryServiceConnection)'
      repository: '$(imageRepository)'
      command: 'buildAndPush'  # Build sekaligus push Docker image
      Dockerfile: 'Dockerfile'  # Nama Dockerfile yang digunakan
      tags: |
        latest
        $(tag)
    displayName: 'Build and Push Docker Image'
