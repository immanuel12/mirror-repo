trigger:
  branches:
    include:
      - main  # Jalankan pipeline ketika ada perubahan di branch master
  
  paths:
    include:
    - project

pool:
  name: 'agentpool'  # Menggunakan agentpool yang disediakan

variables:
  tag: '$(Build.BuildId)'  # Menggunakan BuildId sebagai tag versi image

steps:
  # Langkah 1: Install dependencies dan jalankan tes pada aplikasi Node.js
  - task: NodeTool@0
    inputs:
      versionSpec: '14.x'  # Versi Node.js yang akan digunakan (ubah sesuai kebutuhan)
    displayName: 'Install Node.js'

  - script: |
      echo "Installing dependencies..."
      npm install
      echo "Running tests..."
      npm test
    displayName: 'Install dependencies and run tests'

  # Langkah 2: Build Docker image
  - task: Docker@2
    inputs:
      command: 'build'
      Dockerfile: 'Dockerfile'
      tags: |
        latest
        $(tag)
      arguments: '-f Dockerfile .'
    displayName: 'Build Docker Image'

  # Langkah 3: Jalankan container dari Docker image yang telah dibuild
  - script: |
      echo "Running Docker container locally..."
      docker run -d -p 3000:3000 --name your-app-container your-app:$(tag)
    displayName: 'Run Docker Container Locally'
